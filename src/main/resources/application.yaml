spring:
  application:
    name: guest_database
  security:
    user:
      name: ${GUEST_DB_USER:admin}
      password: ${GUEST_DB_PASSWORD:changeme}
  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/guest_database.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
server:
  port: 8080
logging:
  level:
    org.hibernate.orm.jdbc.error: ERROR