spring:
  application:
    name: guest_database
  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/guest_database.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
server:
  port: 8080
logging:
  level:
    org.hibernate.orm.jdbc.error: ERROR
guest-database:
  remember-me-key: ${GUEST_DB_REMEMBER_ME_KEY:changeme-key}
  admin-user: ${GUEST_DB_USER:admin}
  admin-password: ${GUEST_DB_PASSWORD:changeme}
  reader-user: ${GUEST_DB_READER_USER:reader}
  reader-password: ${GUEST_DB_READER_PASSWORD:changeme}
  room-combos:
    "[dogwood-maple suite]":
      - Dogwood Suite
      - Maple Suite
    "[whole main house]":
      - Dogwood Suite
      - Jade Vine Suite
      - Gum Tree Suite
      - Maple Suite