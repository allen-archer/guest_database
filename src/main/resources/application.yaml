spring:
  application:
    name: guest_database
  datasource:
    url: jdbc:sqlite:${DB_PATH:./data/guest_database.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
server:
  port: 8080
guest-database:
  remember-me-key: ${GUEST_DB_REMEMBER_ME_KEY:changeme-key}
  admins: ${GUEST_DB_ADMINS:admin:changeme}
  readers: ${GUEST_DB_READERS:reader:changeme}
  room-combos:
    "[dogwood-maple suite]":
      - Dogwood Suite
      - Maple Suite
    "[whole main house]":
      - Dogwood Suite
      - Jade Vine Suite
      - Gum Tree Suite
      - Maple Suite